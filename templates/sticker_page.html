<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PingKereta Sticker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="/">← Home</a>
      <strong>PingKereta</strong>
    </div>

    <div class="card">
      <div class="brand">
        <div class="logo">🚗</div>
        <div>
          <h2>Hubungi pemilik kereta tanpa nombor telefon</h2>
          <div class="muted">Contact the car owner without showing a phone number</div>
        </div>
      </div>

      <div class="notice">
        <strong>Plat / Plate:</strong> {{ user.plate }}
      </div>

      <div class="actions" style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">
        <a class="btn btn-danger" href="/send/{{ code }}/block">🚫 Kereta anda menghalang saya</a>
        <a class="btn btn-warning" href="/send/{{ code }}/light">💡 Lampu kereta masih ON</a>
        <a class="btn btn-danger" href="/send/{{ code }}/emergency">⚠️ Sila datang segera</a>
        <a class="btn btn-dark" href="/send/{{ code }}/issue">🛠️ Ada masalah pada kereta</a>
        <a class="btn btn-primary" href="/custom/{{ code }}">✍️ Mesej khas</a>
      </div>
    </div>
  </div>
</body>
</html>
