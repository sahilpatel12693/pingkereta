<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Register - PingKereta</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="/">← Home</a>
      <strong>Daftar / Register</strong>
    </div>

    <div class="card">
      <h2>Daftar sticker anda (Register your sticker)</h2>

      <form method="post">
        <label>Nama (Name)</label>
        <input type="text" name="name" required>

        <label>Telegram Chat ID (ID Chat Telegram)</label>
        <input type="text" name="contact" required placeholder="Masukkan Telegram Chat ID anda">
        <small class="muted">Mulakan bot PingKereta dahulu, kemudian tampal Telegram Chat ID anda.</small>

        <label>Plat nombor (Plate number)</label>
        <input type="text" name="plate" required>

        <input type="hidden" name="notif" value="Telegram">

        <div class="actions" style="margin-top:20px;">
          <button class="btn btn-primary" type="submit">Daftar / Register</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
